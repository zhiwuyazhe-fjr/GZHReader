db_path: ./data/gzhreader.db

source:
  mode: aggregate
  url: http://127.0.0.1:4000/feeds/all.atom

rss_service:
  mode: bundled_wewe_rss
  base_url: http://127.0.0.1:4000
  port: 4000
  host: 127.0.0.1
  data_dir: ./.runtime/wewe-rss/data
  log_file: ./logs/wewe-rss.log

schedule:
  daily_time: "21:30"
  timezone: Asia/Shanghai

rss:
  timezone: Asia/Shanghai
  day_start: "00:00"
  request_timeout_seconds: 20
  user_agent: GZHReader/v2.0.0
  daily_article_limit: 20

article_fetch:
  enabled: true
  trigger: missing_rss_content
  mode: hybrid
  timeout_seconds: 20
  browser_channel_order:
    - msedge
    - chrome
  max_content_chars: 12000

llm:
  base_url: https://api.openai.com/v1
  api_key: ""
  model: gpt-4o-mini
  timeout_seconds: 90
  retries: 2
  temperature: 0.2

output:
  briefing_dir: ./output/briefings
  raw_archive_dir: ./output/raw
  save_raw_html: false
  log_level: INFO
