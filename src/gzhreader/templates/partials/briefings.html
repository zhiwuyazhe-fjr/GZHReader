<section class="panel">
  <div class="spaced results-toolbar" style="margin-bottom: 12px;">
    <div>
      <h2>生成结果</h2>
      <div class="subtle">这里仅展示 GZHReader 生成的 Markdown 日报，不会混入其它普通 Markdown 文件。</div>
      <div class="meta">当前目录：{{ briefing_dir_display }}</div>
    </div>
    <form method="get" action="/partials/briefings" hx-get="/partials/briefings" hx-target="#briefings-section" hx-swap="innerHTML" hx-push-url="false">
      <button class="light" type="submit">刷新结果列表</button>
    </form>
  </div>

  {% if briefings %}
    <div class="results-list">
      {% for item in briefings %}
        <div class="result-item">
          <div>
            <strong>{{ item.date_text }}</strong>
            <div class="meta">{{ item.path }}</div>
          </div>
          <a class="button light" href="/briefings/{{ item.date_text }}">打开</a>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="subtle">还没有生成过日报。完成第 7 步后，这里会出现 <code>{{ briefing_dir_display }}/YYYY-MM-DD.md</code>。</div>
  {% endif %}
</section>
