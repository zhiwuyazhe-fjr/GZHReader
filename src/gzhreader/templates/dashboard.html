<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GZHReader 控制台</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/static/brand/gzhreader-icon.svg">
  <script src="/assets/htmx.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --surface: rgba(17, 17, 17, 0.7);
      --surface-strong: #111111;
      --surface-soft: rgba(24, 24, 27, 0.8);
      --border: #2d2d2d;
      --text: #ededed;
      --muted: #a1a1aa;
      --brand: #3b82f6;
      --brand-strong: #2563eb;
      --brand-soft: rgba(59, 130, 246, 0.18);
      --ok: #22c55e;
      --ok-soft: rgba(34, 197, 94, 0.16);
      --warn: #f59e0b;
      --warn-soft: rgba(245, 158, 11, 0.16);
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, 0.16);
      --shadow-lg: 0 30px 70px -30px rgba(59, 130, 246, 0.45), 0 0 0 1px rgba(59, 130, 246, 0.15);
      --shadow-sm: 0 18px 36px -26px rgba(0, 0, 0, 0.75), 0 0 0 1px rgba(255, 255, 255, 0.04);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --sidebar-width: 300px;
      --transition-core: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      --glow-brand: 0 0 0 1px rgba(59, 130, 246, 0.55), 0 0 16px rgba(59, 130, 246, 0.35);
      --glow-soft: 0 0 0 1px rgba(255, 255, 255, 0.05), 0 12px 32px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Space Grotesk", "Noto Sans SC", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      display: flex;
      overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }

    .app-shell {
      display: flex;
      flex: 1;
      min-height: 100vh;
      width: 100%;
      background: var(--bg);
      align-items: stretch;
    }
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      flex: 0 0 var(--sidebar-width);
      padding: 18px 18px 28px;
      background: var(--surface-strong);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .sidebar-resizer-shell {
      flex: 0 0 14px;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.45), rgba(10, 10, 10, 0));
    }
    .sidebar-resizer {
      width: 4px;
      margin: 12px 0;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.3), rgba(59, 130, 246, 0.75), rgba(59, 130, 246, 0.3));
      opacity: 0.55;
      cursor: col-resize;
      transition: var(--transition-core);
      outline: none;
    }
    .sidebar-resizer-shell:hover .sidebar-resizer,
    .sidebar-resizer:focus-visible,
    body.sidebar-dragging .sidebar-resizer {
      opacity: 1;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.35);
    }
    body.sidebar-dragging,
    body.sidebar-dragging * {
      cursor: col-resize !important;
      user-select: none;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-brand img {
      width: 42px;
      height: 42px;
      padding: 6px;
      border-radius: 14px;
      background: rgba(59, 130, 246, 0.18);
      border: 1px solid rgba(59, 130, 246, 0.4);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .sidebar-subtitle {
      font-size: 12px;
      color: var(--muted);
    }
    .sidebar-brand-muted {
      padding: 4px 2px 10px;
      opacity: 0.78;
    }
    .sidebar-brand-muted .sidebar-brand img,
    .sidebar-brand-muted img {
      width: 38px;
      height: 38px;
      border-radius: 12px;
    }
    .sidebar-brand-muted .sidebar-title {
      font-size: 17px;
    }
    .sidebar-brand-muted .sidebar-subtitle {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .sidebar-section {
      display: grid;
      gap: 12px;
    }
    .sidebar-section-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sidebar-overview-section {
      gap: 14px;
    }
    .sidebar-status-list {
      display: grid;
      gap: 12px;
    }
    .sidebar-status-card {
      width: 100%;
      min-height: 112px;
      padding: 18px 16px;
      border-radius: 22px;
      border: 1px solid rgba(59, 130, 246, 0.18);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.78), rgba(10, 10, 10, 0.92));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 18px 38px -30px rgba(59, 130, 246, 0.45);
      display: grid;
      gap: 10px;
      align-content: center;
      justify-items: start;
      text-align: left;
    }
    .sidebar-status-card:hover {
      transform: translateY(-2px);
      border-color: rgba(59, 130, 246, 0.35);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.28), 0 20px 32px -24px rgba(59, 130, 246, 0.55);
    }
    .sidebar-status-card:focus-visible {
      outline: none;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.35), 0 0 0 4px rgba(59, 130, 246, 0.22);
    }
    .sidebar-status-state {
      font-size: 32px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #f8fbff;
    }
    .sidebar-status-label {
      font-size: 18px;
      color: #dbeafe;
      line-height: 1.35;
    }
    .sidebar-entry-list {
      display: grid;
      gap: 12px;
    }
    .sidebar-entry-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--glow-soft);
      overflow: hidden;
    }
    .sidebar-entry-card > summary {
      list-style: none;
    }
    .sidebar-entry-card > summary::-webkit-details-marker {
      display: none;
    }
    .sidebar-entry-summary {
      position: relative;
      display: block;
      padding: 16px;
      cursor: pointer;
    }
    .sidebar-entry-summary span {
      display: grid;
      gap: 8px;
    }
    .sidebar-entry-summary::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 50%;
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(191, 219, 254, 0.75);
      border-bottom: 2px solid rgba(191, 219, 254, 0.75);
      transform: translateY(-65%) rotate(45deg);
      transition: transform 0.2s ease, opacity 0.2s ease;
      opacity: 0.85;
    }
    .sidebar-entry-card[open] .sidebar-entry-summary::after {
      transform: translateY(-35%) rotate(225deg);
    }
    .sidebar-entry-body {
      display: grid;
      gap: 12px;
      padding: 0 16px 16px;
      container-type: inline-size;
    }

    .main-area {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
    }
    .container {
      max-width: none;
      margin: 0 auto;
      width: 100%;
      padding: 28px 32px 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      background:
        radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.18), transparent 45%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(10, 10, 10, 0.92) 70%);
      border: 1px solid rgba(59, 130, 246, 0.28);
      box-shadow: var(--shadow-lg);
      margin-bottom: 20px;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -10%;
      top: -30%;
      width: 45%;
      padding-bottom: 45%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.28), rgba(59, 130, 246, 0) 70%);
      pointer-events: none;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.28);
      border-radius: 999px;
      font-size: 12px;
      color: #cbd5f5;
    }
    .hero-copy {
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 1;
    }
    .hero-title-row {
      display: grid;
      grid-template-columns: 60px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }
    .hero-logo {
      width: 60px;
      height: 60px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(59, 130, 246, 0.16);
      border: 1px solid rgba(59, 130, 246, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .hero h1 { margin: 0 0 6px; font-size: 26px; line-height: 1.2; }
    .hero p { margin: 0; line-height: 1.8; font-size: 15px; color: #dbeafe; }
    .hero-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hero-chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(59, 130, 246, 0.2);
      font-size: 12px;
      line-height: 1.4;
      color: #dbeafe;
    }
    .hero-centered {
      padding: 34px 38px 30px;
    }
    .hero-copy-centered {
      justify-items: center;
      text-align: center;
      gap: 18px;
    }
    .hero-eyebrow {
      justify-self: center;
    }
    .hero-brand-lockup {
      display: grid;
      justify-items: center;
      gap: 14px;
      width: 100%;
    }
    .hero-logo-xl {
      width: 102px;
      height: 102px;
      padding: 16px;
      border-radius: 28px;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.32);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 16px 36px -28px rgba(59, 130, 246, 0.55);
    }
    .hero-brand-lockup h1 {
      margin: 0;
      font-size: clamp(42px, 4.6vw, 58px);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .hero-chip-band {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .hero-chip-wide {
      width: 100%;
      min-height: 54px;
      justify-content: center;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.72), rgba(10, 10, 10, 0.92));
      border-color: rgba(59, 130, 246, 0.24);
      text-align: center;
    }
    .hero-lead {
      max-width: 980px;
      margin: 0;
      font-size: 18px;
      line-height: 1.85;
      color: #e2ebff;
      text-align: center;
    }
    .hero-primary-actions {
      display: flex;
      justify-content: center;
      width: 100%;
    }
    .hero-primary-button {
      min-width: 220px;
      min-height: 54px;
      padding: 0 28px;
      font-size: 16px;
      font-weight: 700;
    }

    .hero-side {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      display: grid;
      gap: 12px;
      backdrop-filter: blur(12px);
    }
    .hero-side-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero-metric { display: grid; gap: 6px; }
    .hero-side .kicker { font-size: 12px; color: var(--muted); margin: 0; }
    .hero-side code {
      display: block;
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.5);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.06);
      overflow-wrap: anywhere;
    }
    .hero-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .hero-mini-card {
      padding: 12px;
      border-radius: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
    }
    .hero-mini-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }
    .hero-mini-card span {
      font-size: 12px;
      color: var(--muted);
    }
    .sidebar-link-list {
      display: grid;
      gap: 12px;
    }
    .sidebar-link-card {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--glow-soft);
    }
    .sidebar-link-kicker {
      display: inline-flex;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.16);
      color: #bfdbfe;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .sidebar-link-card strong {
      font-size: 16px;
      line-height: 1.4;
    }
    .sidebar-link-card code {
      display: block;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .sidebar-link-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .sidebar-link-actions form {
      margin: 0;
    }
    .sidebar-link-actions-adaptive {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
    }
    .sidebar-link-actions-adaptive > * {
      min-width: 0;
    }
    .sidebar-link-actions-adaptive form {
      width: 100%;
    }
    .sidebar-link-actions-adaptive .button,
    .sidebar-link-actions-adaptive button {
      width: 100%;
    }
    @container (max-width: 300px) {
      .sidebar-link-actions-adaptive {
        grid-template-columns: 1fr;
      }
    }
    .copy-button.copied, .copy-button.copied:hover {
      background: rgba(34, 197, 94, 0.18);
      border-color: rgba(34, 197, 94, 0.55);
      color: #86efac;
      box-shadow: none;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      position: relative;
      z-index: 1;
      margin-top: 2px;
    }
    .hero-actions form {
      margin: 0;
    }
    .hero-actions-secondary {
      justify-content: center;
      width: 100%;
    }
    .hero-actions-secondary .button,
    .hero-actions-secondary button {
      min-width: 178px;
    }
    .hero-status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      position: relative;
      z-index: 1;
      width: 100%;
      margin-top: 8px;
    }
    .hero-status-card {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(59, 130, 246, 0.2);
      backdrop-filter: blur(12px);
      min-height: 230px;
      text-align: left;
    }
    .hero-status-card strong {
      font-size: 18px;
      line-height: 1.35;
      color: #f8fbff;
    }
    .hero-status-card span {
      font-size: 13px;
      line-height: 1.7;
      color: #dbeafe;
      overflow-wrap: anywhere;
    }
    .hero-status-card code {
      display: block;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
    }
    .hero-status-card .sidebar-link-actions {
      margin-top: auto;
    }

    .main-stack { display: grid; gap: 24px; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(16px);
      transition: var(--transition-core);
    }
    .panel:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    .panel-title {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .subtle { color: var(--muted); line-height: 1.8; font-size: 14px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .between { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .spaced { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .helper-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .helper-card {
      border: 1px solid var(--border);
      background: var(--surface-soft);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--glow-soft);
    }
    .helper-card strong { display: block; margin-bottom: 6px; font-size: 15px; }
    .helper-card code { font-size: 13px; }

    .button, button {
      border: 1px solid rgba(59, 130, 246, 0.55);
      border-radius: 14px;
      background: rgba(59, 130, 246, 0.08);
      color: #e6efff;
      padding: 11px 18px;
      min-height: 46px;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition-core);
      box-shadow: none;
    }
    .button:hover, button:hover {
      transform: translateY(-1px);
      box-shadow: var(--glow-brand);
    }
    .button:active, button:active {
      transform: translateY(0);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.6);
    }
    .button.light, button.light {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-color: var(--border);
    }
    .button.light:hover, button.light:hover {
      box-shadow: var(--glow-soft);
      border-color: rgba(148, 163, 184, 0.5);
    }
    .button.ghost, button.ghost {
      background: transparent;
      color: var(--brand);
      border: 1px solid rgba(59, 130, 246, 0.35);
      box-shadow: none;
    }
    .button.warn, button.warn {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.6);
      color: #fcd34d;
      box-shadow: none;
    }
    .button.warn:hover, button.warn:hover {
      box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.6), 0 0 18px rgba(245, 158, 11, 0.4);
    }
    .button.secondary, button.secondary {
      background: rgba(148, 163, 184, 0.08);
      border-color: rgba(148, 163, 184, 0.4);
      color: #e2e8f0;
      box-shadow: none;
    }
    button:disabled, fieldset:disabled button, fieldset:disabled .button {
      opacity: 0.56;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 16px;
      background: rgba(8, 8, 8, 0.8);
      color: var(--text);
      font: inherit;
      transition: var(--transition-core);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.35);
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.75);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25), inset 0 1px 2px rgba(0, 0, 0, 0.35);
    }
    textarea { min-height: 260px; resize: vertical; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 13px; }
    .field { display: grid; gap: 7px; }
    .field label { font-size: 14px; color: var(--muted); }
    .field-note { font-size: 12px; color: var(--muted); }
    .password-input {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .password-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(10, 10, 10, 0.9);
      color: var(--muted);
      box-shadow: none;
      padding: 0;
      transition: var(--transition-core);
    }
    .password-toggle:hover {
      transform: none;
      background: rgba(59, 130, 246, 0.12);
      color: var(--brand);
      border-color: rgba(59, 130, 246, 0.4);
    }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }

    .flash {
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 18px;
      border: 1px solid var(--border);
      line-height: 1.7;
      box-shadow: var(--shadow-sm);
      background: var(--surface-soft);
    }

<body>
  <div class="app-shell">
    <aside id="sidebar-shell" class="sidebar">{% include "partials/sidebar.html" %}</aside>
    <div class="sidebar-resizer-shell" aria-hidden="true">
      <div id="sidebar-resizer" class="sidebar-resizer" role="separator" aria-orientation="vertical" aria-controls="sidebar-shell" aria-label="调整左侧栏宽度" tabindex="0"></div>
    </div>

    <div class="main-area">
      <div class="container">
        <div id="top-chrome">{% include "partials/top_chrome.html" %}</div>

        <div id="action-response" class="sr-only" aria-hidden="true"></div>
        <div id="busy-banner" class="busy-banner" aria-live="polite"></div>
        <div id="flash-area">{% include "partials/flash.html" %}</div>

        <main id="main-shell" class="main-stack">{% include "partials/main_content.html" %}</main>
      </div>
    </div>
  </div>
  <script>
    (() => {
      const busyBanner = document.getElementById('busy-banner');
      const storage = (() => {
        try {
          return window.localStorage;
        } catch (_error) {
          return null;
        }
      })();
      const sidebarConfig = {
        minWidth: 260,
        maxWidth: 520,
        defaultWidth: 300,
        widthKey: 'gzhreader.sidebar.width',
        sectionsKey: 'gzhreader.sidebar.sections',
      };
      const desktopSidebarMedia = window.matchMedia('(min-width: 1025px)');
      let pendingScrollRestore = null;
      let dragState = null;

      const getScrollContainer = () => document.querySelector('.main-area');
      const resolveScrollRoot = () => {
        const scrollRoot = getScrollContainer();
        if (!scrollRoot) return null;
        return scrollRoot.scrollHeight > scrollRoot.clientHeight ? scrollRoot : null;
      };
      const getScrollTop = () => {
        const activeRoot = resolveScrollRoot();
        return activeRoot ? activeRoot.scrollTop : window.scrollY;
      };
      const setScrollTop = (value, behavior = 'auto') => {
        const activeRoot = resolveScrollRoot();
        if (activeRoot) {
          activeRoot.scrollTo({ top: value, behavior });
        } else {
          window.scrollTo({ top: value, behavior });
        }
      };
      const readStoredNumber = (key, fallback) => {
        if (!storage) return fallback;
        const parsed = Number.parseInt(storage.getItem(key) || '', 10);
        return Number.isFinite(parsed) ? parsed : fallback;
      };
      const writeStoredValue = (key, value) => {
        if (!storage) return;
        try {
          storage.setItem(key, value);
        } catch (_error) {
        }
      };
      const readStoredJson = (key, fallback) => {
        if (!storage) return fallback;
        try {
          const raw = storage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (_error) {
          return fallback;
        }
      };
      const clampSidebarWidth = (value) => Math.min(sidebarConfig.maxWidth, Math.max(sidebarConfig.minWidth, value));
      const applySidebarWidth = (value = readStoredNumber(sidebarConfig.widthKey, sidebarConfig.defaultWidth)) => {
        document.documentElement.style.setProperty('--sidebar-width', `${clampSidebarWidth(value)}px`);
      };
      const storeSidebarWidth = (value) => {
        writeStoredValue(sidebarConfig.widthKey, String(clampSidebarWidth(value)));
      };
      const readSidebarSectionStates = () => {
        const states = readStoredJson(sidebarConfig.sectionsKey, {});
        return states && typeof states === 'object' ? states : {};
      };
      const storeSidebarSectionState = (sectionId, isOpen) => {
        const next = readSidebarSectionStates();
        next[sectionId] = isOpen;
        writeStoredValue(sidebarConfig.sectionsKey, JSON.stringify(next));
      };
      const applySidebarSectionStates = (root = document) => {
        const states = readSidebarSectionStates();
        for (const details of root.querySelectorAll('details[data-sidebar-section]')) {
          const sectionId = details.dataset.sidebarSection;
          if (!sectionId) continue;
          details.open = Object.prototype.hasOwnProperty.call(states, sectionId) ? Boolean(states[sectionId]) : false;
        }
      };
      const updateSidebarWidthFromPointer = (clientX) => {
        if (!dragState || !desktopSidebarMedia.matches) return;
        const nextWidth = clampSidebarWidth(dragState.startWidth + (clientX - dragState.startX));
        applySidebarWidth(nextWidth);
        storeSidebarWidth(nextWidth);
      };
      const stopSidebarDrag = () => {
        if (!dragState) return;
        dragState = null;
        document.body.classList.remove('sidebar-dragging');
      };
      const bindSidebarResizer = () => {
        const resizer = document.getElementById('sidebar-resizer');
        if (!resizer || resizer.dataset.sidebarBound === 'true') return;

        resizer.addEventListener('pointerdown', (event) => {
          if (!desktopSidebarMedia.matches) return;
          const sidebar = document.getElementById('sidebar-shell');
          dragState = {
            startX: event.clientX,
            startWidth: sidebar?.getBoundingClientRect().width || readStoredNumber(sidebarConfig.widthKey, sidebarConfig.defaultWidth),
          };
          document.body.classList.add('sidebar-dragging');
          if (typeof resizer.setPointerCapture === 'function') {
            resizer.setPointerCapture(event.pointerId);
          }
          event.preventDefault();
        });
        window.addEventListener('pointermove', (event) => updateSidebarWidthFromPointer(event.clientX));
        window.addEventListener('pointerup', stopSidebarDrag);
        window.addEventListener('pointercancel', stopSidebarDrag);
        resizer.addEventListener('keydown', (event) => {
          if (!desktopSidebarMedia.matches) return;
          const delta = event.key === 'ArrowLeft' ? -16 : event.key === 'ArrowRight' ? 16 : 0;
          if (!delta) return;
          event.preventDefault();
          const currentWidth = readStoredNumber(sidebarConfig.widthKey, sidebarConfig.defaultWidth);
          const nextWidth = clampSidebarWidth(currentWidth + delta);
          applySidebarWidth(nextWidth);
          storeSidebarWidth(nextWidth);
        });
        resizer.dataset.sidebarBound = 'true';
      };
      const bindSidebarSections = (root = document) => {
        applySidebarSectionStates(root);
        for (const details of root.querySelectorAll('details[data-sidebar-section]')) {
          if (details.dataset.sectionBound === 'true') continue;
          details.addEventListener('toggle', () => {
            const sectionId = details.dataset.sidebarSection;
            if (!sectionId) return;
            storeSidebarSectionState(sectionId, details.open);
          });
          details.dataset.sectionBound = 'true';
        }
      };
      const scrollToTarget = (selector) => {
        if (!selector) return;
        const target = document.querySelector(selector);
        if (!target) return;
        const activeRoot = resolveScrollRoot();
        if (activeRoot) {
          const rootRect = activeRoot.getBoundingClientRect();
          const targetRect = target.getBoundingClientRect();
          const top = activeRoot.scrollTop + targetRect.top - rootRect.top - 18;
          activeRoot.scrollTo({ top: Math.max(top, 0), behavior: 'smooth' });
          return;
        }
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      const bindScrollTargets = () => {
        if (document.body.dataset.scrollBound === 'true') return;
        document.body.addEventListener('click', (event) => {
          const trigger = event.target.closest('[data-scroll-target]');
          if (!trigger) return;
          event.preventDefault();
          scrollToTarget(trigger.dataset.scrollTarget || '');
        });
        document.body.dataset.scrollBound = 'true';
      };

      const defaultMessage = '正在处理，请稍候…';
      const messageByPath = (path) => {
        if (!path) return defaultMessage;
        if (path.includes('/actions/run-now')) return '正在生成日报，这一步可能需要 5-10 分钟，请先别关闭页面。';
        if (path.includes('/actions/pick-output-dir')) return '正在打开系统目录选择器，请在弹出的窗口里完成选择。';
        if (path.includes('/actions/install-schedule')) return '正在保存并安装计划任务，请稍候。';
        if (path.includes('/actions/start-rss')) return '正在启动 RSS 服务，请稍候。';
        return defaultMessage;
      };
      const showBusy = (message) => {
        if (!busyBanner) return;
        busyBanner.textContent = message;
        busyBanner.classList.add('show');
      };
      const hideBusy = () => {
        if (!busyBanner) return;
        busyBanner.textContent = '';
        busyBanner.classList.remove('show');
      };
      const bindBusyBanner = () => {
        if (!busyBanner || !window.htmx || document.body.dataset.busyBound === 'true') return;
        document.body.addEventListener('htmx:beforeRequest', (event) => {
          const path = event.detail?.pathInfo?.requestPath || '';
          const trigger = event.detail?.elt;
          const targetSelector = trigger?.getAttribute?.('hx-target') || trigger?.closest?.('form')?.getAttribute?.('hx-target') || '';
          if (targetSelector === '#action-response') {
            pendingScrollRestore = getScrollTop();
          }
          showBusy(messageByPath(path));
        });
        document.body.addEventListener('htmx:afterRequest', hideBusy);
        document.body.addEventListener('htmx:responseError', hideBusy);
        document.body.addEventListener('htmx:sendError', hideBusy);
        document.body.addEventListener('htmx:afterSettle', () => {
          if (pendingScrollRestore === null) return;
          const restoreTop = pendingScrollRestore;
          pendingScrollRestore = null;
          window.requestAnimationFrame(() => {
            setScrollTop(restoreTop);
          });
        });
        document.body.dataset.busyBound = 'true';
      };

      const bindSchedulePreview = (root = document) => {
        const hourSelect = root.querySelector('#schedule-hour-select');
        const minuteSelect = root.querySelector('#schedule-minute-select');
        const limitSelect = root.querySelector('#daily-article-limit-select');
        const timePreview = root.querySelector('#schedule-preview-time');
        const limitPreview = root.querySelector('#schedule-preview-limit');
        if (!hourSelect || !minuteSelect || !limitSelect || !timePreview || !limitPreview) return;

        const renderPreview = () => {
          const hour = String(hourSelect.value ?? '').padStart(2, '0');
          const minute = String(minuteSelect.value ?? '').padStart(2, '0');
          const selectedOption = limitSelect.options[limitSelect.selectedIndex];
          const limitLabel = selectedOption?.dataset?.label || selectedOption?.text || '';
          timePreview.textContent = `每天 ${hour}:${minute}`;
          limitPreview.textContent = limitLabel;
        };

        for (const element of [hourSelect, minuteSelect, limitSelect]) {
          if (element.dataset.previewBound === 'true') continue;
          element.addEventListener('change', renderPreview);
          element.dataset.previewBound = 'true';
        }
        renderPreview();
      };

      const bindPasswordToggles = (root = document) => {
        const toggles = root.querySelectorAll('[data-toggle-password]');
        for (const toggle of toggles) {
          if (toggle.dataset.passwordBound === 'true') continue;
          toggle.addEventListener('click', () => {
            const targetId = toggle.dataset.target;
            const input = targetId ? document.getElementById(targetId) : null;
            if (!input) return;
            const showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';
            toggle.setAttribute('aria-pressed', String(!showing));
            toggle.innerHTML = showing
              ? '<svg class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 20px; height: 20px; stroke-width: 2; flex-shrink: 0;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>'
              : '<svg class="eye-icon-slash" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 20px; height: 20px; stroke-width: 2; flex-shrink: 0;"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>';
            toggle.title = showing ? '显示 API Key' : '隐藏 API Key';
          });
          toggle.dataset.passwordBound = 'true';
        }
      };

      const bindCopyButtons = (root = document) => {
        const buttons = root.querySelectorAll('[data-copy-text]');
        for (const button of buttons) {
          if (button.dataset.copyBound === 'true') continue;
          button.addEventListener('click', async () => {
            const copyText = button.dataset.copyText || '';
            if (!copyText) return;

            const resetLabel = button.dataset.copyLabel || button.textContent?.trim() || '复制';
            button.dataset.copyLabel = resetLabel;

            try {
              if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(copyText);
              } else {
                const input = document.createElement('textarea');
                input.value = copyText;
                input.setAttribute('readonly', '');
                input.style.position = 'absolute';
                input.style.left = '-9999px';
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
              }
              button.textContent = button.dataset.copiedLabel || '已复制';
              button.classList.add('copied');
            } catch (_error) {
              button.textContent = '复制失败';
            }

            const previousTimer = Number(button.dataset.copyTimer || '0');
            if (previousTimer) {
              window.clearTimeout(previousTimer);
            }
            const timerId = window.setTimeout(() => {
              button.textContent = button.dataset.copyLabel || '复制';
              button.classList.remove('copied');
              button.dataset.copyTimer = '';
            }, 1600);
            button.dataset.copyTimer = String(timerId);
          });
          button.dataset.copyBound = 'true';
        }
      };

      const initializeUiBindings = (root = document) => {
        applySidebarWidth();
        bindSidebarResizer();
        bindScrollTargets();
        bindBusyBanner();
        bindSidebarSections(root);
        bindSchedulePreview(root);
        bindPasswordToggles(root);
        bindCopyButtons(root);
      };

      initializeUiBindings(document);
      const handleSidebarMediaChange = () => {
        stopSidebarDrag();
        applySidebarWidth();
      };
      if (typeof desktopSidebarMedia.addEventListener === 'function') {
        desktopSidebarMedia.addEventListener('change', handleSidebarMediaChange);
      } else if (typeof desktopSidebarMedia.addListener === 'function') {
        desktopSidebarMedia.addListener(handleSidebarMediaChange);
      }

      document.body.addEventListener('htmx:afterSwap', () => {
        initializeUiBindings(document);
      });
    })();
  </script>
</body>
</html>
